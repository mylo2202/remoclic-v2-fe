      <h2>Hệ thống dự báo hạn hán và khí hậu</h2>
    </div>
    <mat-nav-list>
      <a mat-list-item routerLink="/drought-probability-dashboard" routerLinkActive="active-link">

      </a>
      <a mat-list-item routerLink="/drought-event-dashboard" routerLinkActive="active-link">
        <span class="sidenav-item-label" matListItemTitle>Dự báo sự kiện hạn</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>
